name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run check:tokens
      - run: bun run check:types
      - run: bun run test
      - run: bun run build
      - run: bun run check:publish
      # Real Node runtime import of the server-safe entries (root + tokens);
      # ./solid is browser-only, it creates DOM templates at import time.
      - run: node -e "await import('./dist/index.js'); await import('./dist/tokens/index.js')"
