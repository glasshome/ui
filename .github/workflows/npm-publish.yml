name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # npm >= 11.5.1 (node 24) required for OIDC trusted publishing; auth is
      # the npmjs trusted-publisher binding (org glasshome, repo ui, this
      # workflow file), no NPM_TOKEN involved.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run check:tokens
      - run: bun run check:types
      - run: bun run test
      - run: bun run build
      - run: bun run check:publish
      - run: node -e "await import('./dist/index.js'); await import('./dist/tokens/index.js')"
      - run: npm publish --provenance --access public
